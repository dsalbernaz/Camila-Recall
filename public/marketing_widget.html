<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketing | Camila Recall</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; background: transparent; }
  </style>
</head>
<body class="p-4">
  <div class="flex items-center justify-between mb-2">
    <div>
      <h3 class="text-sm font-bold text-gray-900">Mensagens de Marketing (semana)</h3>
      <p class="text-[11px] text-gray-500 mt-0.5">Template: <span id="templateName">-</span></p>
    </div>
    <span class="text-xl font-bold text-gray-900" id="sentCount">-</span>
  </div>

  <div class="w-full h-2.5 rounded-full bg-gray-200 overflow-hidden">
    <div class="h-full transition-all" id="progressBar" style="width:0%; background:#10B981;"></div>
  </div>

  <div class="flex justify-between mt-1 text-[10px] text-gray-500">
    <span id="remainingLabel">-</span>
    <span id="limitLabel">-</span>
  </div>

  <div id="alertBanner" class="hidden mt-3 text-[12px] font-bold text-red-700 bg-red-50 border border-red-200 px-3 py-2 rounded-lg">
    ⚠️ Limite semanal atingido. Pare de enviar este template até a próxima semana.
  </div>

  <p class="text-[9px] text-gray-400 mt-3 text-right" id="lastUpdated"></p>

  <script>
    const API_URL = window.location.origin;

    async function loadSummary() {
      try {
        const res = await fetch(`${API_URL}/api/recall/marketing/summary`);
        const m = await res.json();

        document.getElementById('templateName').textContent = m.templateName || '-';
        document.getElementById('sentCount').textContent = `${m.sent} / ${m.limit}`;
        document.getElementById('remainingLabel').textContent = `${m.remaining} restantes`;
        document.getElementById('limitLabel').textContent = `Limite: ${m.limit}/semana`;

        const pct = Math.min(100, Math.round((m.sent / m.limit) * 100));
        const bar = document.getElementById('progressBar');
        bar.style.width = `${pct}%`;
        bar.style.background = m.overLimit ? '#EF4444' : (pct >= 80 ? '#F59E0B' : '#10B981');

        document.getElementById('alertBanner').classList.toggle('hidden', !m.overLimit);
        document.getElementById('lastUpdated').textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');
      } catch (e) {
        document.getElementById('lastUpdated').textContent = 'Erro ao atualizar: ' + e.message;
      }
    }

    loadSummary();
    setInterval(loadSummary, 30000);
  </script>
</body>
</html>
