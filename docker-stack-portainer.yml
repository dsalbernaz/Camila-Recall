version: '3.8'

services:
  camila_recall:
    image: ${RECALL_IMAGE:-ghcr.io/dsalbernaz/camila-recall:latest}
    environment:
      - NODE_ENV=production
      - RECALL_PORT=3001
      - RECALL_DB_SCHEMA=${RECALL_DB_SCHEMA:-recall}
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - CHATWOOT_BASE_URL=${CHATWOOT_BASE_URL}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
      - CHATWOOT_API_ACCESS_TOKEN=${CHATWOOT_API_ACCESS_TOKEN}
      - CHATWOOT_RECALL_INBOX_ID=${CHATWOOT_RECALL_INBOX_ID:-5}
      - RECALL_META_WHATSAPP_TOKEN=${RECALL_META_WHATSAPP_TOKEN}
      - RECALL_META_PHONE_NUMBER_ID=${RECALL_META_PHONE_NUMBER_ID}
      - CLINIC_NAME=${CLINIC_NAME}
      - RECALL_DRY_RUN=${RECALL_DRY_RUN:-true}
      - RECALL_ENABLE_REAL_SEND=${RECALL_ENABLE_REAL_SEND:-false}
      - RECALL_TEST_DESTINATION_PHONE=${RECALL_TEST_DESTINATION_PHONE}
      - RECALL_ALLOWED_PHONES=${RECALL_ALLOWED_PHONES}
      - RECALL_ALLOWED_LEAD_IDS=${RECALL_ALLOWED_LEAD_IDS}
      - RECALL_MAX_SENDS_PER_RUN=${RECALL_MAX_SENDS_PER_RUN:-1}
      - RECALL_TIME_WINDOWS=${RECALL_TIME_WINDOWS:-10:00-18:00}
      - RECALL_TEMPLATE_OPENING=${RECALL_TEMPLATE_OPENING:-recall_abertura_1}
      - RECALL_TEMPLATE_REMINDER=${RECALL_TEMPLATE_REMINDER:-recall_lembrete_2}
      - RECALL_TEMPLATE_LANGUAGE=${RECALL_TEMPLATE_LANGUAGE:-pt_BR}
      - RECALL_TEMPLATE_USE_FIRST_NAME=${RECALL_TEMPLATE_USE_FIRST_NAME:-true}
      - RECALL_REMINDER_DELAY_DAYS=${RECALL_REMINDER_DELAY_DAYS:-3}
    networks:
      - Dg579500
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.20'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=Dg579500"
        - "traefik.http.routers.camila_recall.rule=Host(`${RECALL_PUBLIC_HOST:-dashboard.oc332.com.br}`)"
        - "traefik.http.routers.camila_recall.entrypoints=websecure"
        - "traefik.http.routers.camila_recall.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.camila_recall.loadbalancer.server.port=3001"
        - "traefik.http.services.camila_recall.loadbalancer.passHostHeader=1"

networks:
  Dg579500:
    external: true
